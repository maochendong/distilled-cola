volumes:
  distilled-cola-embeddings:

services:
  app:
    build: .
    container_name: distilled-cola
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - distilled-cola-embeddings:/app/data/embeddings
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
